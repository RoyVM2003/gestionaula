<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Aula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librería gratuita para leer archivos PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Librería para generar Gráficas Interactivas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
  
    <style>
      :root {
        --bg: #f8efe8;
        --card: rgba(255, 252, 248, 0.86);
        --ink: #433b4f;
        --muted: #7b728b;
        --accent: #8b6cf6;
        --accent-2: #ff9b8a;
      }

      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 185, 180, 0.3), transparent 24%),
          radial-gradient(circle at bottom right, rgba(139, 108, 246, 0.2), transparent 32%),
          var(--bg);
      }

      .clay-card {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: 10px 10px 26px rgba(183, 163, 159, 0.24), -10px -10px 24px rgba(255, 255, 255, 0.82), inset 1px 1px 2px rgba(255, 255, 255, 0.7), inset -1px -1px 3px rgba(141, 126, 126, 0.16);
        backdrop-filter: blur(18px);
      }

      .clay-button {
        background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(247, 236, 255, 0.9));
        box-shadow: 8px 8px 18px rgba(167, 147, 146, 0.18), -6px -6px 16px rgba(255,255,255,0.88);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .clay-button:hover {
        transform: translateY(-1px);
      }

      .clay-button:active {
        transform: translateY(1px);
        box-shadow: inset 2px 2px 5px rgba(142, 121, 120, 0.2), inset -2px -2px 5px rgba(255,255,255,0.9);
      }

      .input-clay {
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: inset 2px 2px 6px rgba(169, 151, 151, 0.16), inset -2px -2px 6px rgba(255,255,255,0.8);
      }

      .nav-pill.active {
        background: linear-gradient(135deg, rgba(139,108,246,0.2), rgba(255,155,138,0.16));
        box-shadow: inset 1px 1px 3px rgba(255,255,255,0.8), inset -1px -1px 3px rgba(120,102,132,0.14);
      }

      .chip {
        background: rgba(255,255,255,0.65);
        border: 1px solid rgba(255,255,255,0.78);
        box-shadow: inset 1px 1px 3px rgba(255,255,255,0.85), inset -1px -1px 3px rgba(154,144,148,0.18);
      }

      .sticky-col {
        position: sticky;
        left: 0;
        z-index: 20;
        background: rgba(255,255,255,0.95);
      }

      .sticky-col-right {
        position: sticky;
        right: 0;
        z-index: 20;
        background: rgba(255,255,255,0.95);
      }

      .attendance-scroll {
        overflow-x: scroll;
        overflow-y: hidden;
        scrollbar-width: thin;
        scrollbar-color: rgba(139,108,246,0.65) rgba(241,245,249,0.95);
        scrollbar-gutter: stable;
      }
      .attendance-scroll::-webkit-scrollbar {
        height: 10px;
      }
      .attendance-scroll::-webkit-scrollbar-track {
        background: rgba(241,245,249,0.9);
        border-radius: 999px;
      }
      .attendance-scroll::-webkit-scrollbar-thumb {
        background: rgba(139,108,246,0.6);
        border-radius: 999px;
      }
      .attendance-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(139,108,246,0.85);
      }

      @media print {
        body {
          background: white;
        }
        .no-print {
          display: none !important;
        }
        .print-card {
          box-shadow: none !important;
          border: 1px solid #ddd;
        }
      }
    </style>
  </head>
  <body class="min-h-screen">
    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
      <div class="clay-card rounded-[36px] p-8 md:p-10 w-full max-w-md">
        <div class="text-center mb-8">
          <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-[24px] bg-gradient-to-br from-fuchsia-200 via-rose-100 to-amber-100 text-3xl shadow-inner">
            ✦
          </div>
          <h1 class="text-2xl font-semibold">Gestor de Aula</h1>
          <p class="mt-2 text-sm text-slate-600">Tu espacio para planear clases, asistencia y reportes desde tu laptop.</p>
        </div>
        <form id="loginForm" class="space-y-4">
          <label class="block">
            <span class="mb-1 block text-sm font-medium">Matrícula </span>
            <input id="username" class="input-clay w-full rounded-2xl px-4 py-3 outline-none uppercase" placeholder="Contraseña" required />
          </label>
          <button type="submit" class="clay-button w-full rounded-2xl px-4 py-3 font-semibold">Entrar al panel</button>
        </form>
        <p class="mt-4 text-center text-xs text-slate-500">Acceso local para el docente.</p>
      </div>
    </div>

    <div id="mainApp" class="hidden min-h-screen px-3 py-4 md:px-6 lg:px-8">
      <div class="mx-auto max-w-7xl">
        <header class="clay-card no-print mb-6 rounded-[32px] p-4 md:p-5">
          <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
              <p class="text-sm font-semibold uppercase tracking-[0.3em] text-slate-500">Panel docente</p>
              <h2 class="text-2xl font-semibold">Bienvenido, <span id="headerName">Docente</span></h2>
            </div>
            <div class="flex flex-wrap items-center gap-2">
              <button id="logoutBtn" class="clay-button rounded-2xl px-4 py-2 font-medium">Cerrar sesión</button>
            </div>
          </div>
        </header>

        <div class="grid gap-6 lg:grid-cols-[260px_minmax(0,1fr)]">
          <aside class="clay-card no-print rounded-[30px] p-4 md:p-5">
            <div class="mb-5 text-center">
              <div class="mx-auto mb-3 flex h-14 w-14 items-center justify-center rounded-[22px] bg-gradient-to-br from-violet-200 via-pink-100 to-orange-100 text-2xl">📚</div>
              <h3 class="text-lg font-semibold">Navegación</h3>
            </div>
            <nav class="space-y-2">
              <button class="nav-pill active w-full rounded-2xl px-4 py-3 text-left text-sm font-medium" data-view="materias">Materias</button>
              <button class="nav-pill w-full rounded-2xl px-4 py-3 text-left text-sm font-medium" data-view="alumnos">Lista de Alumnos</button>
              <button class="nav-pill w-full rounded-2xl px-4 py-3 text-left text-sm font-medium" data-view="reportes">Generar Reportes</button>
              <button class="nav-pill w-full rounded-2xl px-4 py-3 text-left text-sm font-medium" data-view="perfil">Mi Perfil</button>
            </nav>
          </aside>

          <main id="contentArea" class="space-y-6"></main>
        </div>
      </div>
    </div>

    <div id="toast" class="pointer-events-none fixed bottom-4 right-4 z-50 hidden rounded-2xl px-4 py-3 text-sm font-medium text-slate-700 shadow-xl"></div>

    <script>
      const STORAGE_KEY = 'clayTeacherAppData';
      const defaultData = {
        auth: { username: '' },
        profile: { nombre: '', institucion: '', ciclo: '', correo: '' },
        subjects: [],
        students: [],
        studentLists: []
      };

      const defaultActivityCategories = [
        { id: 'tarea', name: 'Tarea', weight: 1, color: '#f97316' },
        { id: 'proyecto', name: 'Proyecto', weight: 2, color: '#2563eb' },
        { id: 'examen', name: 'Examen', weight: 3, color: '#dc2626' },
        { id: 'ejercicio', name: 'Ejercicio', weight: 1, color: '#16a34a' },
        { id: 'otros', name: 'Otros', weight: 1, color: '#8b6cf6' }
      ];

      let appData = loadData();
      let attendanceBackups = {}; 
      let currentView = 'materias';
      let activeSubjectId = null;
      let activeSubjectTab = 'asistencia';

      let editingSubjectId = null;
      let editingStudentId = null;
      let editingStudentListId = null;
      let editingActivityId = null;
      let viewingStudentListId = null;
      let draftListName = '';
      let draftListEntries = [];
      let draftListText = '';
      let isLoggedIn = false;

      // Variables para la vista de reportes
      let activeReportTab = 'lista';
      let selectedReportListId = null;
      let selectedReportStudentId = null;
      let activeChartInstance = null;

      const loginScreen = document.getElementById('loginScreen');
      const mainApp = document.getElementById('mainApp');
      const contentArea = document.getElementById('contentArea');
      const loginForm = document.getElementById('loginForm');
      const logoutBtn = document.getElementById('logoutBtn');
      const headerName = document.getElementById('headerName');
      const toast = document.getElementById('toast');

      init();

      function init() {
        bindGlobalEvents();
        render();
        if (isLoggedIn) {
          showApp();
        }
      }

      function bindGlobalEvents() {
        const doLogin = (ev) => {
          try {
            if (ev && ev.preventDefault) ev.preventDefault();
            
            const usernameEl = document.getElementById('username');
            if (!usernameEl) {
              showToast('Error: campo de ingreso no encontrado');
              return;
            }
            
            const entrada = usernameEl.value.trim().toUpperCase();
            const accesosValidos = ['AULA2026', 'PEPE VERBER'];
            
            if (accesosValidos.includes(entrada)) {
              appData.auth = { username: 'Pepe Verber' };
              saveData();
              isLoggedIn = true;
              showApp();
              showToast('¡Bienvenido, Pepe Verber!');
            } else {
              showToast('Matrícula o usuario no válido');
            }
          } catch (err) {
            console.error('Login error', err);
            showToast('Error al iniciar sesión');
          }
        };

        if (loginForm) loginForm.addEventListener('submit', doLogin);

        logoutBtn.addEventListener('click', () => {
          isLoggedIn = false;
          hideApp();
          showToast('Sesión cerrada');
        });

        document.querySelectorAll('[data-view]').forEach((button) => {
          button.addEventListener('click', () => {
            currentView = button.getAttribute('data-view');
            document.querySelectorAll('[data-view]').forEach((item) => item.classList.remove('active'));
            button.classList.add('active');
            render();
          });
        });

        contentArea.addEventListener('click', handleContentClick);
        contentArea.addEventListener('submit', handleContentSubmit);
        contentArea.addEventListener('input', handleContentInput);
        contentArea.addEventListener('change', handleContentChange);
      }

      function handleContentClick(event) {
        const button = event.target.closest('button');
        if (!button) return;

        const action = button.getAttribute('data-action');
        const id = button.getAttribute('data-id');

        if (action === 'select-subject') {
          activeSubjectId = id;
          activeSubjectTab = 'asistencia';
          render();
        }

        if (action === 'back-to-subjects') {
          activeSubjectId = null;
          render();
        }

        if (action === 'edit-subject') {
          editingSubjectId = id;
          render();
        }

        if (action === 'delete-subject') {
          if (!window.confirm('¿Estás seguro de eliminar esta materia?')) return;
          appData.subjects = appData.subjects.filter((item) => item.id !== id);
          if (activeSubjectId === id) activeSubjectId = null;
          saveData();
          render();
          showToast('Materia eliminada');
        }

        if (action === 'switch-subject-tab') {
          activeSubjectTab = button.getAttribute('data-tab');
          render();
        }

        if (action === 'toggle-attendance') {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          const studentId = button.getAttribute('data-student-id');
          const today = getTodayKey();
          if (!subject.attendanceByDate) subject.attendanceByDate = {};
          if (!subject.attendanceByDate[today]) subject.attendanceByDate[today] = {};
          const current = subject.attendanceByDate[today][studentId] || 'presente';
          const next = current === 'presente' ? 'falta' : current === 'falta' ? 'retardo' : 'presente';
          subject.attendanceByDate[today][studentId] = next;
          saveData();
          render();
        }

        if (action === 'bulk-attendance-present') {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          const date = button.getAttribute('data-date');
          if (!date) return;
          
          const students = getSubjectStudents(subject);
          if (students.length === 0) return;

          if (!subject.attendanceByDate) subject.attendanceByDate = {};
          if (!subject.attendanceByDate[date]) subject.attendanceByDate[date] = {};

          const backupKey = `${subject.id}_${date}`;
          attendanceBackups[backupKey] = { ...subject.attendanceByDate[date] };

          students.forEach((student) => {
            subject.attendanceByDate[date][student.id] = 'presente';
          });

          saveData();

          const individualButtons = contentArea.querySelectorAll(`[data-action="toggle-cell"][data-date="${date}"]`);
          individualButtons.forEach((btn) => {
            btn.textContent = '🟢';
          });

          button.outerHTML = `
            <button type="button" 
                    class="mt-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] font-medium px-1.5 py-0.5 rounded-md border border-slate-300 transition-colors flex items-center gap-1"
                    data-action="undo-bulk-attendance" 
                    data-date="${date}" 
                    title="Restaurar estados anteriores">
              ↩️ Deshacer
            </button>
          `;

          updateUiPercentagesInRealTime(subject, students);
          showToast(`Asistencia general aplicada.`);
        }

        if (action === 'undo-bulk-attendance') {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          const date = button.getAttribute('data-date');
          if (!date) return;

          const students = getSubjectStudents(subject);
          const backupKey = `${subject.id}_${date}`;

          if (attendanceBackups[backupKey]) {
            subject.attendanceByDate[date] = { ...attendanceBackups[backupKey] };
            delete attendanceBackups[backupKey];
          } else {
            subject.attendanceByDate[date] = {};
          }

          saveData();

          const individualButtons = contentArea.querySelectorAll(`[data-action="toggle-cell"][data-date="${date}"]`);
          individualButtons.forEach((btn) => {
            const studentId = btn.getAttribute('data-student-id');
            const state = subject.attendanceByDate[date][studentId] || '';
            const label = state === 'presente' ? '🟢' : state === 'falta' ? '🔴' : state === 'retardo' ? '🟡' : '◻️';
            btn.textContent = label;
          });

          button.outerHTML = `
            <button type="button" 
                    class="mt-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 text-[10px] font-medium px-1.5 py-0.5 rounded-md border border-emerald-200/60 transition-colors flex items-center gap-1"
                    data-action="bulk-attendance-present" 
                    data-date="${date}" 
                    title="Marcar asistencia general para este día">
              👥 Todos 🟢
            </button>
          `;

          updateUiPercentagesInRealTime(subject, students);
          showToast(`Se restauraron las asistencias anteriores.`);
        }

        if (action === 'toggle-cell') {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          const date = button.getAttribute('data-date');
          const studentId = button.getAttribute('data-student-id');
          if (!date || !studentId) return;
          if (!subject.attendanceByDate) subject.attendanceByDate = {};
          if (!subject.attendanceByDate[date]) subject.attendanceByDate[date] = {};
          
          const current = subject.attendanceByDate[date][studentId] || '';
          const next = current === '' ? 'presente' : current === 'presente' ? 'falta' : current === 'falta' ? 'retardo' : '';
          
          if (next === '') {
            delete subject.attendanceByDate[date][studentId];
          } else {
            subject.attendanceByDate[date][studentId] = next;
          }
          
          saveData();
          
          const label = next === 'presente' ? '🟢' : next === 'falta' ? '🔴' : next === 'retardo' ? '🟡' : '◻️';
          button.textContent = label;
          
          const row = button.closest('tr');
          if (row) {
            const storedStartDate = subject.attendanceStartDate || addDays(getTodayKey(), -30);
            const storedEndDate = subject.attendanceEndDate || getTodayKey();
            const attendanceDates = getWeekdaysInRange(storedStartDate, storedEndDate);
            const totalDiasPosibles = attendanceDates.length;

            if (totalDiasPosibles > 0) {
              let diasAsistidos = 0;
              attendanceDates.forEach(d => {
                if (subject.attendanceByDate[d]?.[studentId] === 'presente') {
                  diasAsistidos++;
                }
              });

              const attendancePercent = Math.round((diasAsistidos / totalDiasPosibles) * 100);
              const percentCell = row.querySelector('.sticky-col-right');
              if (percentCell) {
                percentCell.innerHTML = `
                  <div class="pct-container flex flex-col items-center justify-center bg-slate-50/50 rounded-lg p-1 border border-slate-100" data-student-id="${studentId}">
                    <div class="text-slate-400 font-normal text-[10px] mb-0.5">${diasAsistidos}/${totalDiasPosibles} d</div>
                    <div class="text-slate-700 text-sm font-semibold">${attendancePercent}%</div>
                  </div>
                `;
              }
            }
          }
        }

        if (action === 'edit-student-list') {
          const list = appData.studentLists.find((item) => item.id === id);
          editingStudentListId = id;
          viewingStudentListId = null;
          draftListName = list?.name || '';
          draftListEntries = (list?.studentIds || []).map((studentId) => {
            const student = appData.students.find((item) => item.id === studentId);
            return student?.name || '';
          }).filter(Boolean);
          render();
        }

        if (action === 'view-student-list') {
          viewingStudentListId = id === viewingStudentListId ? null : id;
          render();
        }

        if (action === 'delete-student-list') {
          if (!window.confirm('¿Estás seguro de eliminar esta lista?')) return;
          appData.studentLists = appData.studentLists.filter((item) => item.id !== id);
          appData.subjects.forEach((subject) => {
            subject.studentListIds = (subject.studentListIds || []).filter((listId) => listId !== id);
          });
          saveData();
          render();
          showToast('Lista eliminada');
        }

        if (action === 'assign-list-to-subject') {
          const listId = button.getAttribute('data-id');
          const container = button.closest('.list-card');
          const select = container?.querySelector('select');
          const subjectId = select?.value;
          const list = appData.studentLists.find((item) => item.id === listId);
          const subject = appData.subjects.find((item) => item.id === subjectId);
          if (!list || !subject) {
            showToast('Selecciona una materia');
            return;
          }
          list.subjectIds = Array.from(new Set([...(list.subjectIds || []), subject.id]));
          subject.studentListIds = Array.from(new Set([...(subject.studentListIds || []), list.id]));
          syncSubjectStudentsFromLists(subject);
          saveData();
          render();
          showToast(`Lista asignada a ${subject.name}`);
        }

        if (action === 'select-subject-list') {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          const list = appData.studentLists.find((item) => item.id === id);
          if (!subject || !list) {
            showToast('Lista no encontrada');
            return;
          }
          subject.activeListId = list.id;
          subject.students = list.studentIds.slice();
          saveData();
          render();
          showToast(`Lista ${list.name} activa`);
        }

        if (action === 'edit-activity' || action === 'delete-activity' || action === 'cancel-activity-edit') {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          if (action === 'cancel-activity-edit') {
            editingActivityId = null;
            render();
            return;
          }
          const activity = (subject.activities || []).find((item) => item.id === id);
          if (!activity) return;
          if (action === 'delete-activity') {
            if (!window.confirm('¿Estás seguro de eliminar esta actividad?')) return;
            subject.activities = (subject.activities || []).filter((item) => item.id !== id);
            saveData();
            render();
            showToast('Actividad eliminada');
            return;
          }
          editingActivityId = activity.id;
          render();
        }

        if (action === 'clear-edit') {
          editingSubjectId = null;
          editingStudentId = null;
          editingStudentListId = null;
          draftListName = '';
          draftListEntries = [];
          render();
        }

        if (action === 'export-csv') {
          exportNotesCsv();
        }

        if (action === 'print-risk-report') {
          window.print();
        }

        if (action === 'remove-subject-from-list') {
          const listId = button.getAttribute('data-list-id');
          const subjectId = button.getAttribute('data-subject-id');
          
          const list = appData.studentLists.find((item) => item.id === listId);
          const subject = appData.subjects.find((item) => item.id === subjectId);
          
          if (list && subject) {
            if (!window.confirm(`¿Estás seguro de quitar la materia "${subject.name}" de la lista "${list.name}"?`)) return;
            list.subjectIds = (list.subjectIds || []).filter(id => id !== subjectId);
            subject.studentListIds = (subject.studentListIds || []).filter(id => id !== listId);
            
            if (subject.activeListId === listId) {
              subject.activeListId = null;
            }
            
            syncSubjectStudentsFromLists(subject);
            saveData();
            render();
            showToast(`Materia quitada de la lista`);
          }
        }

        if (action === 'switch-report-tab') {
          activeReportTab = button.getAttribute('data-tab');
          render();
        }
      }

      function handleContentInput(event) {
        const target = event.target;
        if (target.id === 'listNameInput') {
          draftListName = target.value;
          return;
        }

        if (target.id === 'listTextarea') {
          draftListEntries = String(target.value).split(/\r?\n/).map((s) => s.trim()).filter(Boolean);
          return;
        }

        if (target.getAttribute('data-action') === 'set-attendance-dates') {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          const field = target.getAttribute('data-field');
          const value = target.value;
          if (field === 'startDate') {
            subject.attendanceStartDate = value;
          } else if (field === 'endDate') {
            subject.attendanceEndDate = value;
          }
          saveData();
          render();
        }
      }

      function handleContentChange(event) {
        const target = event.target;
        if (target.matches('input[type="file"][data-list-file]')) {
          const file = target.files?.[0];
          if (!file) return;
          processUploadedFile(file);
        }

        if (target.id === 'reportListSelect') {
          selectedReportListId = target.value;
          selectedReportStudentId = null; // Reiniciar alumno cuando cambia la lista
          render();
        }

        if (target.id === 'reportStudentSelect') {
          selectedReportStudentId = target.value;
          render();
        }
      }

      async function handleContentSubmit(event) {
        event.preventDefault();
        const form = event.target;

        if (form.id === 'subjectForm') {
          const name = document.getElementById('subjectName').value.trim();
          const description = document.getElementById('subjectDescription').value.trim();
          const color = document.getElementById('subjectColor')?.value || '#8b6cf6';
          if (!name) {
            showToast('Escribe el nombre de la materia');
            return;
          }
          if (editingSubjectId) {
            const subject = appData.subjects.find((item) => item.id === editingSubjectId);
            if (subject) {
              subject.name = name;
              subject.description = description;
              subject.color = color;
            }
            showToast('Materia actualizada');
          } else {
            appData.subjects.push({
              id: createId(),
              name,
              description,
              color,
              students: [],
              attendanceByDate: {},
              evaluations: {},
              activeListId: null,
              activities: defaultActivityCategories.map((activity) => ({
                id: createId(),
                name: activity.name,
                weight: activity.weight,
                date: getTodayKey(),
                color: activity.color
              }))
            });
            showToast('Materia creada');
          }
          editingSubjectId = null;
          form.reset();
          saveData();
          render();
        }

        if (form.id === 'studentListForm') {
          const name = document.getElementById('listNameInput').value.trim();
          const raw = document.getElementById('listTextarea').value || '';
          const names = splitNames(raw);

          if (!name) {
            showToast('Escribe el nombre de la lista');
            return;
          }
          if (!names.length) {
            showToast('Agrega al menos un nombre');
            return;
          }

          let list = null;
          if (editingStudentListId) {
            list = appData.studentLists.find((item) => item.id === editingStudentListId);
            if (list) {
              list.name = name;
              list.studentIds = [];
            }
            showToast('Lista actualizada');
          } else {
            list = { id: createId(), name, studentIds: [], subjectIds: [] };
            appData.studentLists.push(list);
            showToast(`Lista creada con ${names.length} alumnos`);
          }

          names.forEach((studentName) => {
            const normalized = studentName.toLowerCase();
            const existingStudent = appData.students.find((student) => student.name.toLowerCase() === normalized);
            if (existingStudent) {
              if (!(list.studentIds || []).includes(existingStudent.id)) {
                list.studentIds = [...(list.studentIds || []), existingStudent.id];
              }
            } else {
              const newStudent = { id: createId(), name: studentName };
              appData.students.push(newStudent);
              list.studentIds = [...(list.studentIds || []), newStudent.id];
            }
          });

          editingStudentListId = null;
          draftListName = '';
          draftListEntries = [];
          draftListText = '';
          saveData();
          render();
        }

        if (form.id === 'activityForm') {
          const name = document.getElementById('activityName').value.trim();
          const weightValue = Number(document.getElementById('activityWeight')?.value.trim());
          const categorySelect = document.getElementById('activityCategory');
          const categoryId = categorySelect ? categorySelect.value : defaultActivityCategories[0].id;
          const categoryObj = defaultActivityCategories.find((c) => c.id === categoryId) || defaultActivityCategories[0];

          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          if (!name) {
            showToast('Escribe un nombre de actividad');
            return;
          }
          if (!subject.activities) subject.activities = [];

          if (editingActivityId) {
            const activity = subject.activities.find((item) => item.id === editingActivityId);
            if (activity) {
              activity.name = name;
              activity.color = categoryObj.color;
              activity.weight = Number.isFinite(weightValue) && weightValue > 0 ? weightValue : activity.weight;
            }
            editingActivityId = null;
            showToast('Actividad actualizada');
          } else {
            const activity = {
              id: createId(),
              name,
              weight: Number.isFinite(weightValue) && weightValue > 0 ? weightValue : categoryObj.weight,
              date: getTodayKey(),
              color: categoryObj.color
            };
            subject.activities.push(activity);
            showToast('Actividad creada');
          }

          saveData();
          render();
        }

        if (form.id === 'profileForm') {
          appData.profile = {
            nombre: document.getElementById('profileName').value.trim(),
            institucion: document.getElementById('profileInstitution').value.trim(),
            ciclo: document.getElementById('profileCycle').value.trim(),
            correo: document.getElementById('profileEmail').value.trim()
          };
          saveData();
          render();
          showToast('Perfil guardado');
        }
      }

      function render() {
        const profile = appData.profile || defaultData.profile;
        const displayName = appData.auth?.username || profile.nombre || 'Docente';
        headerName.textContent = displayName;
        document.querySelectorAll('[data-view]').forEach((button) => {
          button.classList.toggle('active', button.getAttribute('data-view') === currentView);
        });

        if (!isLoggedIn) {
          loginScreen.classList.remove('hidden');
          mainApp.classList.add('hidden');
          return;
        }

        loginScreen.classList.add('hidden');
        mainApp.classList.remove('hidden');

        switch (currentView) {
          case 'materias':
            renderMateriasView();
            break;
          case 'alumnos':
            renderAlumnosView();
            break;
          case 'reportes':
            renderReportesView();
            break;
          case 'perfil':
            renderPerfilView();
            break;
          default:
            renderMateriasView();
        }
        scrollAttendanceToToday();
      }

      function renderMateriasView() {
        const subjectList = appData.subjects || [];
        const selectedSubject = subjectList.find((item) => item.id === activeSubjectId) || null;
        const editingSubject = editingSubjectId ? subjectList.find((item) => item.id === editingSubjectId) : null;
        const availableLists = [...(appData.studentLists || [])].sort((a, b) => a.name.localeCompare(b.name));
        const selectedLists = selectedSubject ? availableLists.filter((list) => (selectedSubject.studentListIds || []).includes(list.id)) : [];

        if (selectedSubject) {
          contentArea.innerHTML = `
            <section class="space-y-6">
              <div class="clay-card rounded-[30px] p-5 md:p-6">
                <div class="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                  <div class="flex items-center gap-3">
                    <button class="clay-button rounded-2xl px-3 py-2 text-sm" data-action="back-to-subjects">← Volver</button>
                    <div>
                      <h3 class="text-2xl font-semibold">${escapeHtml(selectedSubject.name)}</h3>
                      <p class="text-sm text-slate-500">${escapeHtml(selectedSubject.description || 'Sin descripción')}</p>
                    </div>
                  </div>
                </div>

                <div class="mb-4 flex gap-2">
                  <button class="clay-button rounded-2xl px-3 py-2 text-sm ${activeSubjectTab === 'asistencia' ? 'nav-pill active' : ''}" data-action="switch-subject-tab" data-tab="asistencia">Asistencia</button>
                  <button class="clay-button rounded-2xl px-3 py-2 text-sm ${activeSubjectTab === 'actividades' ? 'nav-pill active' : ''}" data-action="switch-subject-tab" data-tab="actividades">Actividades</button>
                </div>

                ${selectedLists.length ? `<div class="mb-4 flex flex-wrap gap-2">
                  ${selectedLists.map((list) => `<button type="button" class="clay-button rounded-full px-3 py-2 text-sm ${list.id === selectedSubject.activeListId ? 'border border-slate-300 bg-slate-100' : ''}" data-action="select-subject-list" data-id="${list.id}">${escapeHtml(list.name)}${list.id === selectedSubject.activeListId ? ' · Activa' : ''}</button>`).join('')}
                </div>` : '<p class="text-sm text-slate-500 mb-4">No hay listas vinculadas a esta materia.</p>'}

                ${activeSubjectTab === 'asistencia' ? renderAttendanceTab(selectedSubject) : renderActivitiesTab(selectedSubject)}
              </div>
            </section>
          `;
          return;
        }

        contentArea.innerHTML = `
          <section class="space-y-6">
            <div class="clay-card rounded-[30px] p-5 md:p-6">
              <div class="mb-4 flex items-center justify-between gap-3">
                <div>
                  <p class="text-sm font-semibold uppercase tracking-[0.24em] text-slate-500">Materias</p>
                  <h3 class="text-xl font-semibold">Gestiona tus asignaturas</h3>
                </div>
                <div class="chip rounded-full px-3 py-2 text-sm">${subjectList.length} registradas</div>
              </div>
              <form id="subjectForm" class="grid gap-3 md:grid-cols-[1fr_0.6fr_0.5fr]">
                <input id="subjectName" class="input-clay w-full rounded-2xl px-4 py-3 outline-none" placeholder="Nombre de la materia" value="${escapeHtml(editingSubject?.name || '')}" required />
                <input id="subjectDescription" class="input-clay w-full rounded-2xl px-4 py-3 outline-none" placeholder="Descripción breve" value="${escapeHtml(editingSubject?.description || '')}" />
                <div class="flex gap-2">
                  <input id="subjectColor" type="color" class="w-12 h-12 rounded-xl" value="${escapeHtml(editingSubject?.color || '#8b6cf6')}" title="Color de la materia" />
                  <button type="submit" class="clay-button rounded-2xl px-4 py-3 font-semibold">${editingSubjectId ? 'Actualizar' : 'Agregar'}</button>
                  <button type="button" class="clay-button rounded-2xl px-3 py-3" data-action="clear-edit">↺</button>
                </div>
              </form>
            </div>

            <div class="grid gap-4 md:grid-cols-3">
              ${subjectList.length ? subjectList.map((subject) => `
                <div class="clay-card rounded-[20px] p-4 md:p-5" style="background: linear-gradient(135deg, ${subject.color||'#8b6cf6'}33, ${subject.color||'#8b6cf6'}11); border: 1px solid ${subject.color||'#8b6cf6'}66;">
                  <div class="mb-3 flex items-start justify-between gap-3">
                    <div class="flex-1 min-w-0">
                      <h4 class="text-lg font-semibold truncate">${escapeHtml(subject.name)}</h4>
                      <p class="text-sm text-slate-700 truncate">${escapeHtml(subject.description || 'Sin descripción')}</p>
                    </div>
                    <div class="flex flex-col items-end gap-2 ml-3">
                      <div class="flex gap-2">
                        <button class="clay-button rounded-2xl px-3 py-2 text-sm" data-action="edit-subject" data-id="${subject.id}">Editar</button>
                        <button class="clay-button rounded-2xl px-3 py-2 text-sm" data-action="delete-subject" data-id="${subject.id}">Eliminar</button>
                      </div>
                    </div>
                  </div>
                    <div class="mb-4 flex flex-wrap gap-2 text-sm">
                      <span class="chip rounded-full px-3 py-2">${(subject.studentListIds || []).length} listas inscritas</span>
                      <span class="chip rounded-full px-3 py-2">${(subject.activities || []).length} actividades</span>
                    </div>
                  <button class="clay-button w-full rounded-2xl px-4 py-3 font-semibold" data-action="select-subject" data-id="${subject.id}">Abrir gestión</button>
                </div>
              `).join('') : '<div class="clay-card rounded-[28px] p-5 text-sm text-slate-500">Aún no tienes materias. Crea la primera para comenzar.</div>'}
            </div>
          </section>
        `;
      }

      function renderAttendanceTab(subject) {
        const students = getSubjectStudents(subject);
        const today = getTodayKey();

        const storedStartDate = subject.attendanceStartDate || addDays(today, -30);
        const storedEndDate = subject.attendanceEndDate || today;

        const attendanceDates = getWeekdaysInRange(storedStartDate, storedEndDate);

        if (!students.length) {
          return `<p class="text-sm text-slate-500">No hay alumnos asignados a esta materia o lista.</p>`;
        }

        subject.attendanceByDate = subject.attendanceByDate || {};

        const monthNames = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
        const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];

        const dayHeaders = attendanceDates.map((date) => {
          const dateObj = new Date(date + 'T00:00:00');
          const weekdayName = dayNames[dateObj.getDay()];
          const monthName = monthNames[dateObj.getMonth()];
          const isToday = date === today;

          const hasBackup = attendanceBackups[`${subject.id}_${date}`] ? true : false;

          const buttonHtml = hasBackup 
            ? `<button type="button" 
                       class="mt-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] font-medium px-1.5 py-0.5 rounded-md border border-slate-300 transition-colors flex items-center gap-1"
                       data-action="undo-bulk-attendance" 
                       data-date="${date}" 
                       title="Restaurar estados anteriores">
                 ↩️ Deshacer
               </button>`
            : `<button type="button" 
                       class="mt-1 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 text-[10px] font-medium px-1.5 py-0.5 rounded-md border border-emerald-200/60 transition-colors flex items-center gap-1"
                       data-action="bulk-attendance-present" 
                       data-date="${date}" 
                       title="Marcar asistencia general para este día">
                 👥 Todos 🟢
               </button>`;

          return `
            <th class="px-2 py-2 text-center border border-slate-200" style="min-width:105px;" ${isToday ? 'data-current-day' : ''}>
              <div class="flex flex-col items-center gap-0.5">
                <span class="text-[9px] uppercase font-bold text-slate-400 tracking-wider">${monthName}</span>
                <span class="text-xs uppercase text-slate-500">${weekdayName}</span>
                <span class="font-semibold text-sm">${Number(date.split('-')[2])}</span>
                ${buttonHtml}
              </div>
            </th>
          `;
        }).join('');

        const rows = students.map((student) => {
          const cells = attendanceDates.map((date) => {
            const state = (subject.attendanceByDate[date] || {})[student.id] || '';
            const label = state === 'presente' ? '🟢' : state === 'falta' ? '🔴' : state === 'retardo' ? '🟡' : '◻️';
            return `
              <td class="px-1 py-1 text-center border border-slate-200" style="min-width:105px;">
                <button class="clay-button rounded-md px-2 py-1" data-action="toggle-cell" data-date="${date}" data-student-id="${student.id}">${label}</button>
              </td>
            `;
          }).join('');

          const totalDiasPosibles = attendanceDates.length;
          const diasAsistidos = attendanceDates.filter(date => (subject.attendanceByDate[date]?.[student.id] === 'presente')).length;
          const attendancePercent = totalDiasPosibles > 0 ? Math.round((diasAsistidos / totalDiasPosibles) * 100) : 0;

          return `
            <tr>
              <td class="px-2 py-2 font-medium border border-slate-200 sticky-col" style="width:160px; max-width:160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: white;" title="${escapeHtml(student.name)}">
                ${escapeHtml(student.name)}
              </td>
              ${cells}
              <td class="px-2 py-2 text-center font-bold text-xs border border-slate-200 sticky-col-right pct-container" data-student-id="${student.id}" style="width:80px; max-width:80px; background: white;">
                <div class="text-slate-400 font-normal text-[10px] mb-0.5">${diasAsistidos}/${totalDiasPosibles} d</div>
                <div class="text-slate-700 text-sm">${attendancePercent}%</div>
              </td>
            </tr>
          `;
        }).join('');

        return `
          <div class="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between no-print">
            <div class="flex flex-wrap items-center gap-2">
              <label class="text-sm font-medium text-slate-600">Desde:
                <input type="date" class="input-clay rounded-xl px-3 py-1.5 text-sm" data-action="set-attendance-dates" data-field="startDate" value="${storedStartDate}" />
              </label>
              <label class="text-sm font-medium text-slate-600">Hasta:
                <input type="date" class="input-clay rounded-xl px-3 py-1.5 text-sm" data-action="set-attendance-dates" data-field="endDate" value="${storedEndDate}" />
              </label>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs text-slate-500">Simbología: 🟢 Presente | 🔴 Falta | 🟡 Retardo | ◻️ Vacío</span>
            </div>
          </div>

          <div class="attendance-scroll rounded-2xl border border-slate-200 max-w-full">
            <table class="w-full border-collapse text-left text-xs text-slate-600">
              <thead class="bg-slate-50 uppercase text-[10px] font-semibold text-slate-500">
                <tr>
                  <th class="px-2 py-3 border border-slate-200 sticky-col" style="width:160px; min-width:160px; background: #f8fafc;">Alumno</th>
                  ${dayHeaders}
                  <th class="px-2 py-3 text-center border border-slate-200 sticky-col-right" style="width:80px; min-width:80px; background: #f8fafc;">% Asist.</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200">
                ${rows}
              </tbody>
            </table>
          </div>
        `;
      }

      function renderEvaluationTab(subject) {
        const assignedStudents = getSubjectStudents(subject);
        const activities = (subject.activities || []).filter(Boolean);

        return `
          <div class="space-y-4">
            ${activities.length ? `
              <div class="overflow-x-auto relative">
                <table class="min-w-full text-sm border-collapse" style="border:1px solid rgba(148,163,184,0.35);">
                  <thead>
                    <tr class="text-left text-slate-500">
                      <th class="px-2 py-2 border border-slate-200 sticky-col bg-white">Alumno</th>
                      ${activities.map((activity) => `<th class="px-2 py-2 border border-slate-200" style="min-width:140px;"><div class="flex items-center justify-between gap-2"><div><span style="width:12px;height:12px;border-radius:6px;background:${activity.color||'#8b6cf6'};display:inline-block;margin-right:6px"></span><span>${escapeHtml(activity.name)}</span><div class="text-xs text-slate-500">${activity.weight} pts · ${activity.date || ''}</div></div><div class="flex gap-1"><button type="button" class="text-slate-500 hover:text-slate-800" data-action="edit-activity" data-id="${activity.id}" title="Editar actividad">✏️</button><button type="button" class="text-slate-500 hover:text-red-600" data-action="delete-activity" data-id="${activity.id}" title="Eliminar actividad">🗑️</button></div></div></th>`).join('')}
                      <th class="px-2 py-2 border border-slate-200 sticky-col-right bg-white">Promedio</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${assignedStudents.map((student) => {
                      const studentGrades = subject.evaluations?.[student.id] || {};
                      const weightedSum = activities.reduce((sum, activity) => {
                        const rawValue = studentGrades[activity.id] ?? studentGrades[activity.name] ?? '';
                        if (rawValue === '') return sum;
                        return sum + (Number(rawValue) * activity.weight);
                      }, 0);
                      const totalWeight = activities.reduce((sum, activity) => {
                        const rawValue = studentGrades[activity.id] ?? studentGrades[activity.name] ?? '';
                        return sum + (rawValue === '' ? 0 : activity.weight);
                      }, 0);
                      const average = totalWeight ? (weightedSum / totalWeight).toFixed(1) : '—';
                      return `
                        <tr>
                          <td class="px-2 py-2 font-medium border border-slate-200 sticky-col bg-white">${escapeHtml(student.name)}</td>
                          ${activities.map((activity) => `
                            <td class="px-2 py-2 border border-slate-200">
                              <input class="input-clay w-20 rounded-xl px-2 py-2 text-sm outline-none" type="number" step="0.1" value="${studentGrades[activity.id] ?? studentGrades[activity.name] ?? ''}" data-student-id="${student.id}" data-activity="${activity.id}" />
                            </td>
                          `).join('')}
                          <td class="px-2 py-2 font-semibold border border-slate-200 sticky-col-right bg-white">${average}</td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            ` : '<p class="text-sm text-slate-500">Crea una actividad para empezar a registrar notas.</p>'}
          </div>
        `;
      }

      function renderActivitiesTab(subject) {
        const categoryChips = defaultActivityCategories.map((activity) => `
          <span class="inline-flex items-center gap-2 rounded-2xl px-3 py-2 text-sm font-semibold text-white" style="background:${activity.color};">
            ${escapeHtml(activity.name)}
          </span>
        `).join('');

        const editingActivity = editingActivityId ? (subject.activities || []).find((activity) => activity.id === editingActivityId) : null;
        const activityNameValue = editingActivity ? escapeHtml(editingActivity.name) : '';
        const activityWeightValue = editingActivity ? escapeHtml(editingActivity.weight) : '';
        const selectedCategoryId = editingActivity ? (defaultActivityCategories.find((cat) => cat.color === editingActivity.color)?.id || defaultActivityCategories[0].id) : defaultActivityCategories[0].id;
        const actionLabel = editingActivity ? 'Actualizar actividad' : 'Agregar actividad';

        return `
          <div class="space-y-4">
            <div class="flex flex-wrap gap-2 mb-4">${categoryChips}</div>
            <form id="activityForm" class="grid gap-3 md:grid-cols-[1.4fr_1fr_0.8fr_0.4fr_auto] mb-4">
              <input id="activityName" class="input-clay rounded-2xl px-4 py-3 outline-none" placeholder="Nombre de la actividad" required value="${activityNameValue}" />
              <select id="activityCategory" class="input-clay rounded-2xl px-4 py-3 outline-none">
                ${defaultActivityCategories.map((category) => `<option value="${escapeHtml(category.id)}" ${category.id === selectedCategoryId ? 'selected' : ''}>${escapeHtml(category.name)}</option>`).join('')}
              </select>
              <input id="activityWeight" type="number" min="0" step="0.1" class="input-clay rounded-2xl px-4 py-3 outline-none" placeholder="Ponderación" value="${activityWeightValue}" />
              <div></div>
              <div class="flex gap-2">
                <button type="submit" class="clay-button rounded-2xl px-4 py-3 font-semibold">${actionLabel}</button>
                ${editingActivity ? `<button type="button" class="clay-button rounded-2xl px-4 py-3 font-semibold" data-action="cancel-activity-edit">Cancelar</button>` : ''}
              </div>
            </form>
            ${renderEvaluationTab(subject)}
          </div>
        `;
      }

      function renderAlumnosView() {
        const subjects = appData.subjects || [];
        const studentLists = [...(appData.studentLists || [])].sort((a, b) => a.name.localeCompare(b.name));

        contentArea.innerHTML = `
          <section class="space-y-6">
            <div class="clay-card rounded-[30px] p-5 md:p-6">
              <div class="mb-4 flex items-center justify-between gap-3">
                <div>
                  <p class="text-sm font-semibold uppercase tracking-[0.24em] text-slate-500">Crear lista</p>
                  <h3 class="text-xl font-semibold">Pon un nombre y arma la lista (una línea por alumno)</h3>
                </div>
                <div class="chip rounded-full px-3 py-2 text-sm">${studentLists.length} listas</div>
              </div>

              <form id="studentListForm" class="space-y-4">
                <div class="grid gap-3 md:grid-cols-[1fr_auto]">
                  <input id="listNameInput" class="input-clay w-full rounded-2xl px-4 py-3 outline-none" placeholder="Nombre de la lista" value="${escapeHtml(draftListName)}" required />
                  <div class="flex gap-2">
                    <label class="clay-button cursor-pointer rounded-2xl px-4 py-3 font-semibold">
                      Agregar desde archivo
                      <input type="file" accept=".txt,.csv,.pdf" class="hidden" data-list-file="true" />
                    </label>
                    <button type="submit" class="clay-button rounded-2xl px-4 py-3 font-semibold">Guardar lista</button>
                  </div>
                </div>

                <textarea id="listTextarea" class="input-clay w-full min-h-[160px] rounded-[16px] px-4 py-3 outline-none" placeholder="Escribe un nombre por línea (Enter para nueva línea)">${escapeHtml(draftListEntries.join('\n'))}</textarea>
              </form>
            </div>

            <div class="mt-5 space-y-3">
              <div class="flex items-center justify-between gap-3">
                <h4 class="text-lg font-semibold">Listas guardadas</h4>
                <div class="chip rounded-full px-3 py-2 text-sm">${studentLists.length}</div>
              </div>

      function syncSubjectStudentsFromLists(subject) {
        const listIds = subject.studentListIds || [];
        const listMembers = listIds.flatMap((listId) => {
          const list = appData.studentLists.find((item) => item.id === listId);
          return list?.studentIds || [];
        });
        const mergedIds = Array.from(new Set([...(subject.students || []), ...listMembers]));
        subject.students = mergedIds;
      }

      function getSubjectStudents(subject) {
        if (subject.activeListId) {
          const list = appData.studentLists.find((item) => item.id === subject.activeListId);
          return (list?.studentIds || [])
            .map((studentId) => appData.students.find((student) => student.id === studentId))
            .filter(Boolean);
        }
        return (subject.students || [])
          .map((studentId) => appData.students.find((student) => student.id === studentId))
          .filter(Boolean);
      }

        appData.subjects.forEach(subject => {

      function buildRiskReportRowsRedesigned() {
        const rows = [];
        appData.subjects.forEach((subject) => {
          const students = getSubjectStudents(subject);
          students.forEach((student) => {
            const studentId = student.id;
            const evaluations = subject.evaluations?.[studentId] || {};
            const values = Object.values(evaluations).filter((value) => value !== '').map(Number);
            const average = values.length ? (values.reduce((sum, value) => sum + value, 0) / values.length) : 0;
            
            const attendanceEntries = Object.values(subject.attendanceByDate || {}).flatMap((day) => Object.entries(day));
            const studentAttendanceEntries = attendanceEntries.filter(([id]) => id === studentId);
            const presences = studentAttendanceEntries.filter(([, state]) => state === 'presente').length;
            const attendancePercent = studentAttendanceEntries.length ? Math.round((presences / studentAttendanceEntries.length) * 100) : 100;

            let icon = '🟢';
            let statusText = 'Estado Óptimo';
            let statusBg = 'bg-emerald-100 text-emerald-800';
            let borderColor = 'border-emerald-400';

            if (attendancePercent < 80 || (values.length && average < 6.0)) {
              icon = '🔴';
              statusText = 'Riesgo Alto: ';
              if (values.length && average < 6.0 && attendancePercent < 80) statusText += 'Nota y Asistencia';
              else if (values.length && average < 6.0) statusText += 'Nota Baja';
              else statusText += 'Baja Asistencia';
              statusBg = 'bg-rose-100 text-rose-800';
              borderColor = 'border-rose-500';
            } else if ((attendancePercent >= 80 && attendancePercent <= 84) || (values.length && average >= 6.0 && average <= 7.5)) {
              icon = '🟡';
              statusText = 'Advertencia: ';
              if (attendancePercent >= 80 && attendancePercent <= 84) statusText += 'Asistencia Límite';
              else statusText += 'Nota Regular';
              statusBg = 'bg-amber-100 text-amber-800';
              borderColor = 'border-amber-400';
            }

            rows.push({
              subjectName: subject.name,
              studentName: student.name,
              average: values.length ? average.toFixed(1) : '—',
              attendancePercent: attendancePercent,
              icon,
              statusText,
              statusBg,
              borderColor
            });
          });
        });

        // Ordenar colocando primero los de riesgo alto, luego advertencia y al final óptimo
        return rows.sort((a, b) => {
          const priority = { '🔴': 1, '🟡': 2, '🟢': 3 };
          return (priority[a.icon] || 4) - (priority[b.icon] || 4);
        });
      }

      function initReportChart() {
        const canvas = document.getElementById('reportChartCanvas');
        if (!canvas) return;

        if (activeChartInstance) {
          activeChartInstance.destroy();
        }

        const ctx = canvas.getContext('2d');

        if (activeReportTab === 'lista') {
          const studentLists = appData.studentLists || [];
          const currentList = studentLists.find(l => l.id === selectedReportListId);
          if (!currentList) return;

          const listStudents = (currentList.studentIds || []).map(id => appData.students.find(s => s.id === id)).filter(Boolean);

          const labels = appData.subjects.map(s => s.name);
          const data = appData.subjects.map(subject => {
            let sum = 0, count = 0;
            listStudents.forEach(st => {
              const ev = subject.evaluations?.[st.id] || {};
              const vals = Object.values(ev).filter(v => v !== '').map(Number);
              if (vals.length) {
                sum += vals.reduce((a,b)=>a+b, 0) / vals.length;
                count++;
              }
            });
            return count ? (sum / count).toFixed(1) : 0;
          });

          activeChartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
              labels: labels,
              datasets: [{
                label: 'Promedio de la Lista (' + currentList.name + ')',
                data: data,
                backgroundColor: 'rgba(139, 108, 246, 0.65)',
                borderColor: 'rgba(139, 108, 246, 1)',
                borderWidth: 1.5,
                borderRadius: 8
              }]
            },
            options: { responsive: true, scales: { y: { min: 0, max: 10 } } }
          });
        }

        if (activeReportTab === 'alumno') {
          const student = appData.students.find(s => s.id === selectedReportStudentId);
          if (!student) return;

          const labels = appData.subjects.map(s => s.name);
          const data = appData.subjects.map(subject => {
            const ev = subject.evaluations?.[student.id] || {};
            const vals = Object.values(ev).filter(v => v !== '').map(Number);
            return vals.length ? (vals.reduce((a,b)=>a+b, 0) / vals.length).toFixed(1) : 0;
          });

          activeChartInstance = new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [{
                label: 'Calificaciones de ' + student.name,
                data: data,
                backgroundColor: 'rgba(255, 155, 138, 0.3)',
                borderColor: 'rgba(255, 155, 138, 1)',
                borderWidth: 2,
                fill: true,
                tension: 0.3
              }]
            },
            options: { responsive: true, scales: { y: { min: 0, max: 10 } } }
          });
        }
      }

      function exportNotesCsv() {
        const subjects = appData.subjects || [];
        const rows = [];
        const profile = appData.profile || defaultData.profile;
        rows.push(['Docente', profile.nombre || '']);
        rows.push(['Institución', profile.institucion || '']);
        rows.push(['Ciclo', profile.ciclo || '']);
        rows.push([]);
        subjects.forEach((subject) => {
          const students = getSubjectStudents(subject).sort((a, b) => a.name.localeCompare(b.name));
          const activities = (subject.activities || []).filter(Boolean);
          rows.push([subject.name]);
          rows.push(['Alumno', ...activities.map((activity) => activity.name), 'Promedio']);
          students.forEach((student) => {
            const evaluations = subject.evaluations?.[student.id] || {};
            const values = activities.map((activity) => evaluations[activity.id] ?? evaluations[activity.name] ?? '');
            const gradeValues = values.filter((v) => v !== '').map(Number);
            const average = gradeValues.length ? (gradeValues.reduce((sum, value) => sum + value, 0) / gradeValues.length).toFixed(1) : '—';
            rows.push([student.name, ...values, average]);
          });
          rows.push([]);
        });
        const csv = rows.map((row) => row.map(escapeCsv).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'sabanas-notas.csv';
        a.click();
        URL.revokeObjectURL(url);
        showToast('CSV descargado');
      }

      function splitNames(raw) {
        if (!raw) return [];
        const headerKeywords = [
          'no', 'num', 'numero', 'n°', 'nº', '#',
          'nombre', 'nombres', 'apellido', 'paterno', 'materno', 
          'apellidos', 'edad', 'grupo', 'grado', 'seccion', 'matricula', 
          'id', 'email', 'correo', 'estudiante', 'alumno'
        ];

        const lines = raw.split(/\r?\n/);
        const cleanNames = [];

        lines.forEach((line) => {
          let trimmed = line.trim();
          if (!trimmed) return;
          if (/^[,;\t\s\.\-]+$/.test(trimmed)) return;

          const words = trimmed.toLowerCase().split(/[,;\t\s]+/);
          const headerMatchCount = words.filter(w => headerKeywords.includes(w)).length;
          if (headerMatchCount >= 2 || (words.length <= 3 && headerMatchCount >= 1)) {
            return; 
          }

          trimmed = trimmed.replace(/^(\d+)[\s\.\,\-\)]+/, '').trim();

          const columns = trimmed
            .split(/[,;\t]+/)
            .map(col => col.replace(/^["']|["']$/g, '').trim())
            .filter(col => {
              if (!col) return false;
              const lowerCol = col.toLowerCase();
              if (headerKeywords.includes(lowerCol)) return false;
              if (/^\d+$/.test(col)) return false;
              if (/^(grupo|grado)?\s*([a-z]|\d+[a-z]?|\d+[\-°][a-z])$/i.test(col)) return false;
              return true;
            });

          if (columns.length > 0) {
            let fullName = columns.join(' ').trim();
            fullName = fullName.replace(/\s+(grupo|grado)?\s*([a-z]|\d+[a-z]?)$/i, '').trim();

            if (fullName && !cleanNames.includes(fullName)) {
              cleanNames.push(fullName);
            }
          }
        });

        return cleanNames;
      }

      function showApp() {
        loginScreen.classList.add('hidden');
        mainApp.classList.remove('hidden');
      }

      function hideApp() {
        loginScreen.classList.remove('hidden');
        mainApp.classList.add('hidden');
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.remove('hidden');
        clearTimeout(showToast.timeout);
        showToast.timeout = setTimeout(() => {
          toast.classList.add('hidden');
        }, 1800);
      }

      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
      }

      function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) {
          return JSON.parse(JSON.stringify(defaultData));
        }
        try {
          const parsed = JSON.parse(stored);
          return {
            ...JSON.parse(JSON.stringify(defaultData)),
            ...parsed,
            profile: { ...defaultData.profile, ...(parsed.profile || {}) },
            auth: { ...defaultData.auth, ...(parsed.auth || {}) },
            subjects: parsed.subjects || [],
            students: parsed.students || [],
            studentLists: parsed.studentLists || []
          };
        } catch (error) {
          return JSON.parse(JSON.stringify(defaultData));
        }
      }

      function createId() {
        return (window.crypto && crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2));
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }

      function escapeCsv(value) {
        const text = String(value ?? '');
        return /[",\n]/.test(text) ? `"${text.replaceAll('"', '""')}"` : text;
      }

      function getTodayKey() {
        return new Date().toISOString().slice(0, 10);
      }

      function addDays(dateString, offset) {
        const date = new Date(dateString);
        date.setDate(date.getDate() + offset);
        return date.toISOString().slice(0, 10);
      }

      function getWeekdaysInRange(startDate, endDate) {
        const dates = [];
        let current = new Date(startDate);
        const limit = new Date(endDate);
        while (current <= limit) {
          const dayOfWeek = current.getDay();
          if (dayOfWeek !== 0 && dayOfWeek !== 6) {
            dates.push(current.toISOString().slice(0, 10));
          }
          current.setDate(current.getDate() + 1);
        }
        return dates;
      }

      function updateUiPercentagesInRealTime(subject, students) {
        const startInput = contentArea.querySelector('input[data-field="startDate"]');
        const endInput = contentArea.querySelector('input[data-field="endDate"]');
        if (startInput && endInput) {
          const dates = getWeekdaysInRange(startInput.value, endInput.value);
          const totalDias = dates.length;

          if (totalDias > 0) {
            students.forEach((student) => {
              let asistencias = 0;
              dates.forEach(d => {
                if (subject.attendanceByDate[d]?.[student.id] === 'presente') {
                  asistencias++;
                }
              });

              const nuevoPorcentaje = Math.round((asistencias / totalDias) * 100);

              const pctContainer = contentArea.querySelector(`.pct-container[data-student-id="${student.id}"]`);
              if (pctContainer) {
                pctContainer.innerHTML = `
                  <div class="text-slate-400 font-normal text-[10px] mb-0.5">${asistencias}/${totalDias} d</div>
                  <div class="text-slate-700 text-sm font-semibold">${nuevoPorcentaje}%</div>
                `;
              }
            });
          }
        }
      }

      function scrollAttendanceToToday() {
        const current = contentArea.querySelector('[data-current-day]');
        if (current) {
          window.requestAnimationFrame(() => {
            current.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
          });
        }
      }

      document.addEventListener('input', (event) => {
        const target = event.target;
        if (target.matches('input[data-student-id][data-activity]')) {
          const subject = appData.subjects.find((item) => item.id === activeSubjectId);
          if (!subject) return;
          if (!subject.evaluations) subject.evaluations = {};
          if (!subject.evaluations[target.dataset.studentId]) subject.evaluations[target.dataset.studentId] = {};
          subject.evaluations[target.dataset.studentId][target.dataset.activity] = target.value;
          saveData();
        }
      });

      async function processUploadedFile(file) {
        const fileName = file.name.toLowerCase();
        let extractedText = '';

        showToast('Procesando archivo...');

        if (fileName.endsWith('.pdf')) {
          try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullPdfText = '';
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const textContent = await page.getTextContent();
              const pageText = textContent.items.map(item => item.str).join(' ');
              fullPdfText += pageText + '\n';
            }
            extractedText = fullPdfText;
          } catch (err) {
            console.error('Error al leer el PDF:', err);
            showToast('Error al leer el contenido del PDF');
            return;
          }
        } else {
          extractedText = await file.text();
        }

        const finalNames = splitNames(extractedText);

        if (finalNames.length === 0) {
          showToast('No se encontraron nombres válidos');
          return;
        }

        draftListEntries = finalNames;
        draftListText = finalNames.join('\n');
        render();
        showToast(`¡Se cargaron ${finalNames.length} alumnos correctamente!`);
      }
    </script>
